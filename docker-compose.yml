version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# SZ Inventory — Docker Compose (Staging / Demo)
# Tested on: ARM64 (Orange Pi One Plus) and AMD64
# For ARM32 (armv7): replace postgrest image — see note in postgrest service
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: szinv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: szinventory
      POSTGRES_USER: szinventory
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    # Tuned for low-memory ARM board
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=30
      -c effective_cache_size=256MB
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=4.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U szinventory -d szinventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - szinv_net

  # ── PostgREST ───────────────────────────────────────────────────────────────
  # NOTE: If your board is ARM32 (run `uname -m` → armv7l), this image will
  # not work. Two options:
  #   1. Comment out this service and use the Next.js app's direct pg queries
  #   2. Build PostgREST from source for armv7
  # If ARM64 (aarch64), this works fine.
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: szinv_postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://szinventory:${DATABASE_PASSWORD}@postgres:5432/szinventory
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: szinventory
      PGRST_SERVER_PORT: 3001
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_POOL: 5
      PGRST_DB_POOL_TIMEOUT: 10
    ports:
      - "8031:3001"
    networks:
      - szinv_net

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: szinv_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://szinventory:${DATABASE_PASSWORD}@postgres:5432/szinventory
      POSTGREST_URL: http://postgrest:3001
      POSTGREST_API_KEY: ${POSTGREST_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_API_URL: http://${HOST_IP:-localhost}:3000
      NEXT_PUBLIC_DEFAULT_COMPANY_ID: ${NEXT_PUBLIC_DEFAULT_COMPANY_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      TZ: Asia/Manila
    ports:
      - "3000:3000"
    networks:
      - szinv_net

volumes:
  postgres_data:

networks:
  szinv_net:
    driver: bridge
